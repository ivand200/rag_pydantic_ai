name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend checks and unit tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: rag_service
          POSTGRES_USER: rag_service
          POSTGRES_PASSWORD: rag_service
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rag_service -d rag_service"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql+psycopg://rag_service:rag_service@127.0.0.1:5432/rag_service
      TEST_DATABASE_URL: postgresql+psycopg://rag_service:rag_service@127.0.0.1:5432/rag_service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        run: uv sync --frozen

      - name: uv run check
        run: uv run ruff check .

      - name: uv run format
        run: uv run ruff format --check .

      - name: Apply migrations
        run: uv run alembic upgrade head

      - name: Unit tests
        run: uv run pytest

  e2e:
    name: Frontend e2e tests
    runs-on: ubuntu-latest
    needs: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: rag_service
          POSTGRES_USER: rag_service
          POSTGRES_PASSWORD: rag_service
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rag_service -d rag_service"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://rag_service:rag_service@127.0.0.1:5432/rag_service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --frozen

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Apply backend migrations
        working-directory: backend
        run: uv run alembic upgrade head

      - name: Start backend
        working-directory: backend
        env:
          CLERK_JWT_PUBLIC_KEY: ${{ secrets.CLERK_JWT_PUBLIC_KEY }}
          BACKEND_CORS_ORIGINS: http://127.0.0.1:5173
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: |
          uv run uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          echo $! > ../backend.pid

      - name: Wait for backend
        run: |
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/health; then
              exit 0
            fi
            sleep 1
          done
          exit 1

      - name: Frontend type check
        working-directory: frontend
        run: npm run type-check

      - name: Frontend build
        working-directory: frontend
        run: npm run build

      - name: E2E tests
        working-directory: frontend
        env:
          VITE_API_BASE_URL: http://127.0.0.1:8000
          DATABASE_URL: ${{ env.DATABASE_URL }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_TESTING_TOKEN: ${{ secrets.CLERK_TESTING_TOKEN }}
          E2E_CLERK_USER_EMAIL: ${{ secrets.E2E_CLERK_USER_EMAIL }}
          E2E_CLERK_USER_PASSWORD: ${{ secrets.E2E_CLERK_USER_PASSWORD }}
        run: npm run e2e:clerk

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          if-no-files-found: ignore
