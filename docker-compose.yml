services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rag_service}
      POSTGRES_USER: ${POSTGRES_USER:-rag_service}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag_service}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-rag_service}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-rag_service_password}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-rag_service}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-rag_service_password}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-rag-documents}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - until mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do sleep 1; done &&
        mc mb --ignore-existing "local/$${OBJECT_STORAGE_BUCKET}"

  backend:
    build:
      context: ./backend
    environment:
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173}
      CLERK_JWT_PUBLIC_KEY: ${CLERK_JWT_PUBLIC_KEY:-}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-rag_service}:${POSTGRES_PASSWORD:-rag_service}@postgres:5432/${POSTGRES_DB:-rag_service}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      CHAT_MODEL: ${CHAT_MODEL:-gpt-5.4-mini}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      RAG_CHUNK_TARGET_TOKENS: ${RAG_CHUNK_TARGET_TOKENS:-512}
      RAG_CHUNK_OVERLAP_TOKENS: ${RAG_CHUNK_OVERLAP_TOKENS:-80}
      RAG_QUERY_REWRITE_HISTORY_MESSAGES: ${RAG_QUERY_REWRITE_HISTORY_MESSAGES:-6}
      RAG_ANSWER_HISTORY_MESSAGES: ${RAG_ANSWER_HISTORY_MESSAGES:-6}
      RAG_RETRIEVAL_TOP_K: ${RAG_RETRIEVAL_TOP_K:-5}
      RAG_RETRIEVAL_MIN_SIMILARITY: ${RAG_RETRIEVAL_MIN_SIMILARITY:-0.45}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-10485760}
      MAX_EXTRACTED_CHARS: ${MAX_EXTRACTED_CHARS:-500000}
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-rag-documents}
      OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY:-rag_service}
      OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY:-rag_service_password}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-us-east-1}
      OBJECT_STORAGE_SECURE: ${OBJECT_STORAGE_SECURE:-false}
      OBJECT_STORAGE_FORCE_PATH_STYLE: ${OBJECT_STORAGE_FORCE_PATH_STYLE:-true}
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  worker:
    build:
      context: ./backend
    command:
      - uv
      - run
      - --no-sync
      - python
      - -m
      - app.ingestion.worker
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-rag_service}:${POSTGRES_PASSWORD:-rag_service}@postgres:5432/${POSTGRES_DB:-rag_service}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      CHAT_MODEL: ${CHAT_MODEL:-gpt-5.4-mini}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      RAG_CHUNK_TARGET_TOKENS: ${RAG_CHUNK_TARGET_TOKENS:-512}
      RAG_CHUNK_OVERLAP_TOKENS: ${RAG_CHUNK_OVERLAP_TOKENS:-80}
      MAX_EXTRACTED_CHARS: ${MAX_EXTRACTED_CHARS:-500000}
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-rag-documents}
      OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY:-rag_service}
      OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY:-rag_service_password}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-us-east-1}
      OBJECT_STORAGE_SECURE: ${OBJECT_STORAGE_SECURE:-false}
      OBJECT_STORAGE_FORCE_PATH_STYLE: ${OBJECT_STORAGE_FORCE_PATH_STYLE:-true}
      INGESTION_WORKER_ID: ${INGESTION_WORKER_ID:-local-worker-1}
      INGESTION_MAX_ATTEMPTS: ${INGESTION_MAX_ATTEMPTS:-3}
      INGESTION_BASE_RETRY_SECONDS: ${INGESTION_BASE_RETRY_SECONDS:-30}
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully

  migrate:
    build:
      context: ./backend
    command: ["uv", "run", "--no-sync", "alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-rag_service}:${POSTGRES_PASSWORD:-rag_service}@postgres:5432/${POSTGRES_DB:-rag_service}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
      VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:-}
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
